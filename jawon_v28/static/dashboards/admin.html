<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>관리자 대시보드 | 자원잇다</title><link rel="stylesheet" href="../css/styles.css"/></head><body class="dashboard" data-role="admin"><div class="dash-layout"><aside class="side"></aside><main class="dash-main" id="main">
<div class="dash-head"><div><span class="eyebrow">관리자 운영센터</span><h1>회원·플랜·문의·단가·API를 통합 관리</h1><p>관리자는 로그인 후 공개 메뉴 대신 관리자 업무 메뉴만 봅니다.</p></div><a class="btn primary" href="../settings.html">관리자 설정</a></div>
<div class="dash-visual-card dark-card"><img src="../assets/visuals/support-ops.webp" alt="관리자 운영"/><div><h2>운영관제</h2><p>회원 심사, 문의답변, 보호자료 권한, 수익 단가, API 연결상태를 관리합니다.</p></div></div>
<div class="kpi"><div class="card"><b>128</b><span>회원</span></div><div class="card"><b>32</b><span>심사대기</span></div><div class="card"><b>18</b><span>문의대기</span></div><div class="card"><b>98</b><span>보호서류</span></div></div>
<section id="members" class="card" style="margin-top:20px"><h2>회원·자격 관리</h2><div class="table-wrap"><table class="table"><thead><tr><th>회원명</th><th>역할</th><th>플랜</th><th>상태</th><th>신뢰점수</th><th>저장</th></tr></thead><tbody id="memberTable"></tbody></table></div></section>
<section class="card" style="margin-top:20px"><h2>품목별 단가 시뮬레이터</h2><div class="form two"><input id="market" class="input" type="number" value="1000" placeholder="자원 시세"/><input id="qty" class="input" type="number" value="100" placeholder="수량"/><input id="refund" class="input" type="number" step="0.01" value="0.68" placeholder="고객 환급률"/><input id="logistics" class="input" type="number" value="12000" placeholder="물류비"/><input id="risk" class="input" type="number" value="5000" placeholder="처리 리스크비"/><input id="fee" class="input" type="number" step="0.01" value="0.1" placeholder="수수료율"/></div><button class="btn primary" id="priceSimBtn" style="margin-top:12px">추천 매입가 계산</button><div id="priceSimResult" style="margin-top:14px"></div></section>
<section class="card" style="margin-top:20px"><h2>문의답변</h2><div class="table-wrap"><table class="table"><thead><tr><th>일시</th><th>문의</th><th>상태</th><th>답변</th><th>저장</th></tr></thead><tbody id="inquiryTable"></tbody></table></div></section>
<section class="card" style="margin-top:20px"><h2>API 연동상태</h2><div id="apiStatus"></div></section>
</main></div><script src="../js/app.js"></script></body></html>
